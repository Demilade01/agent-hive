<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon border -->
  <path d="M 100 20 L 170 55 L 170 145 L 100 180 L 30 145 L 30 55 Z" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Network nodes and connections -->
  <!-- Top node -->
  <circle cx="100" cy="70" r="12" fill="#D946EF" opacity="0.9"/>

  <!-- Bottom left node -->
  <circle cx="70" cy="120" r="12" fill="#00D4FF" opacity="0.9"/>

  <!-- Bottom right node -->
  <circle cx="130" cy="120" r="12" fill="#3B82F6" opacity="0.9"/>

  <!-- Center node -->
  <circle cx="100" cy="100" r="10" fill="#00D4FF" opacity="0.8"/>

  <!-- Connection lines -->
  <line x1="100" y1="82" x2="100" y2="90" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="106" x2="78" y2="114" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="106" x2="122" y2="114" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="70" y2="120" stroke="rgba(0, 212, 255, 0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="130" y2="120" stroke="rgba(0, 212, 255, 0.4)" stroke-width="1.5" stroke-linecap="round"/>
</svg>